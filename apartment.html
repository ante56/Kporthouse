<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Apartman</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
border-radius:20px;
}

.back{
margin-bottom:30px;
display:inline-block;
color:#fff;
text-decoration:none;
}

h1{
margin-bottom:30px;
}
</style>
</head>

<body>

<div class="container">

<a href="/" class="back">← Nazad</a>

<h1 id="title"></h1>
<p id="rating"></p>

<div class="gallery" id="gallery"></div>

</div>

<script>

async function loadApartment(){

const params = new URLSearchParams(window.location.search);
const slug = params.get("slug");

const res = await fetch("/data/apartments.json");
const data = await res.json();

const apartment = data.items.find(a => a.slug === slug);

if(!apartment){
document.getElementById("title").innerText="Apartman nije pronađen";
return;
}

document.getElementById("title").innerText=apartment.title;
document.getElementById("rating").innerText=apartment.ratingText || "";

const gallery=document.getElementById("gallery");

gallery.innerHTML=(apartment.images || []).map(img => `
<img src="${img}">
`).join("");

}

loadApartment();

</script>

</body>
</html>
