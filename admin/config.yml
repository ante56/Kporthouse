backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "apartments"
    label: "Apartmani"
    files:
      - file: "data/apartments.json"
        label: "Lista apartmana"
        name: "apartments_list"
        fields:
          - label: "Apartmani"
            name: "items"
            widget: "list"
            fields:
              - { label: "Naziv", name: "title", widget: "string" }

              - { label: "Slug (npr p1, p2)", name: "slug", widget: "string" }

              - label: "Slike (više)"
                name: "images"
                widget: "list"
                field:
                  { label: "Slika", name: "image", widget: "image", choose_url: false }

              - { label: "Ocjena / tekst", name: "ratingText", widget: "string", required: false }

              - { label: "Airbnb link", name: "airbnbUrl", widget: "string" }
